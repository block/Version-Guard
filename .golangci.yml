# golangci-lint configuration for Version Guard
# Based on Square's Go linting standards

run:
  timeout: 5m
  tests: true
  skip-dirs:
    - vendor
    - protos/squareup  # Generated protobuf code
  skip-files:
    - ".*\\.pb\\.go$"  # Skip generated protobuf files

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    check-shadowing: true
    enable-all: true

  gofmt:
    simplify: true

  goimports:
    local-prefixes: github.com/squareup/version-guard

  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - dupImport  # https://github.com/go-critic/go-critic/issues/845
      - ifElseChain
      - octalLiteral
      - whyNoLint
      - wrapperFunc

  gocyclo:
    min-complexity: 15

  misspell:
    locale: US

  revive:
    rules:
      - name: exported
        severity: warning
        disabled: false
      - name: unexported-return
        severity: warning
        disabled: false
      - name: var-naming
        severity: warning
        disabled: false
      - name: package-comments
        severity: warning
        disabled: false

  stylecheck:
    checks: ["all", "-ST1003"]  # Disable underscores in names (we use them for test mocks)

  unused:
    check-exported: false

linters:
  disable-all: true
  enable:
    # Enabled by default
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused

    # Additional linters
    - bodyclose
    - dupl
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - gofmt
    - goimports
    - goprintffuncname
    - gosec
    - misspell
    - nakedret
    - nolintlint
    - revive
    - rowserrcheck
    - stylecheck
    - unconvert
    - unparam
    - whitespace

issues:
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
        - goconst

    # Exclude staticcheck SA1019 (deprecated) in test files
    - path: _test\.go
      text: "SA1019:"
      linters:
        - staticcheck

    # Exclude linting of autogenerated files
    - path: ".*\\.pb\\.go"
      linters:
        - gofmt
        - goimports
        - stylecheck

    # Allow embedding of structs in test mocks
    - path: _test\.go
      text: "ST1016:"
      linters:
        - stylecheck

  max-issues-per-linter: 0
  max-same-issues: 0
  new: false

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  uniq-by-line: true
  sort-results: true
