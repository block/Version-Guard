apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "version-guard.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "version-guard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "version-guard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "version-guard.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "version-guard.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: version-guard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: 8080
              protocol: TCP
          env:
            - name: GRPC_PORT
              value: "8080"
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
