version: v1
# Each resource defines two YAML maps for clarity:
#
#   required_mappings  — every entry MUST be present and non-empty.
#                        Validated at config load time so YAML typos
#                        fail fast at startup instead of mid-scan.
#   field_mappings     — optional. Missing values produce empty
#                        strings on the typed Resource (for typed
#                        keys: tags) or absent entries in
#                        Resource.Extra (for non-typed keys: name,
#                        account_id, region, owner, ...).
#
# Typed keys (always end up on the typed Resource): resource_id,
# version, engine, tags. Everything else flows into Resource.Extra
# under its YAML logical name.
#
# A given key MUST appear in at most one of the two maps; the loader
# rejects duplicates.
#
# Each resource self-declares what it needs:
#   - aurora-*, elasticache-*, rds-*: resource_id + version + engine
#   - eks:        resource_id + version (engine implicitly "eks")
#   - opensearch: resource_id + version (engine derived from version)
#   - lambda:     resource_id (version + engine derived from
#                 graphEntity.properties JSON)
resources:
  - id: aurora-postgresql
    type: aurora
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "rds/AmazonAuroraPostgreSQL/cluster"
      required_mappings:
        resource_id: "externalId"
        version: "versionDetails.version"
        engine: "typeFields.kind"
      field_mappings:
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    eol:
      provider: endoflife-date
      product: amazon-aurora-postgresql
      schema: standard

  - id: aurora-mysql
    type: aurora
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "rds/AmazonAuroraMySQL/cluster"
      required_mappings:
        resource_id: "externalId"
        version: "versionDetails.version"
        engine: "typeFields.kind"
      field_mappings:
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    eol:
      provider: endoflife-date
      product: amazon-aurora-mysql
      schema: standard

  - id: eks
    type: eks
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "cluster"
      required_mappings:
        # For EKS, Wiz's "externalId" column is an internal hash. Use
        # "providerUniqueId" so the resource ID is the cluster ARN.
        resource_id: "providerUniqueId"
        version: "versionDetails.version"
      field_mappings:
        # engine is implicit ("eks") — EKS reports have no engine column.
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    eol:
      provider: endoflife-date
      product: amazon-eks
      schema: eks_adapter

  - id: elasticache-redis
    type: elasticache
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "elastiCache/*/cluster"
      required_mappings:
        resource_id: "externalId"
        version: "versionDetails.version"
        engine: "typeFields.kind"
      field_mappings:
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    eol:
      provider: endoflife-date
      product: redis
      schema: standard

  - id: opensearch
    type: opensearch
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "elasticSearchService|OpenSearch Domain"
      required_mappings:
        resource_id: "externalId"
        version: "versionDetails.version"
      field_mappings:
        # engine is derived from the version (Elasticsearch <= 7.x vs OpenSearch).
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    eol:
      provider: endoflife-date
      product: amazon-opensearch
      schema: standard

  - id: rds-mysql
    type: rds
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "rds/MySQL/instance"
      required_mappings:
        resource_id: "externalId"
        version: "versionDetails.version"
        engine: "typeFields.kind"
      field_mappings:
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    eol:
      provider: endoflife-date
      product: amazon-rds-mysql
      schema: standard

  - id: rds-postgresql
    type: rds
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "rds/PostgreSQL/instance"
      required_mappings:
        resource_id: "externalId"
        version: "versionDetails.version"
        engine: "typeFields.kind"
      field_mappings:
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    eol:
      provider: endoflife-date
      product: amazon-rds-postgresql
      schema: standard

  - id: lambda
    type: lambda
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "lambda"
      required_mappings:
        # version (runtime) and engine are extracted from
        # graphEntity.properties JSON, not from individual columns.
        resource_id: "externalId"
      field_mappings:
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    eol:
      provider: endoflife-date
      product: aws-lambda
      schema: standard

  # To add a new resource type, follow skills/add-version-guard-resource.
  # Standalone copy-paste templates live in skills/add-version-guard-resource/examples/.
