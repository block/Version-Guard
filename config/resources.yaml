version: v1
# The inventory parser splits CSV column lookups into two maps:
#   - required_mappings: the typed core (resource_id, version, engine)
#       that the parser writes into typed Resource fields.
#   - field_mappings:    every other CSV column, landing in
#       Resource.Fields keyed by the YAML logical name.
#
# Per-type exemptions for required_mappings:
#   - lambda is exempt from version + engine (runtime extracted from
#     graphEntity.properties; engine is implicitly "aws-lambda").
#   - eks and opensearch are exempt from engine (eks uses literal "eks";
#     opensearch derives engine from the version).
resources:
  - id: aurora-postgresql
    type: aurora
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "rds/AmazonAuroraPostgreSQL/cluster"
      required_mappings:
        resource_id: "externalId"
        version: "versionDetails.version"
        engine: "typeFields.kind"
      field_mappings:
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    eol:
      provider: endoflife-date
      product: amazon-aurora-postgresql
      schema: standard

  - id: aurora-mysql
    type: aurora
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "rds/AmazonAuroraMySQL/cluster"
      required_mappings:
        resource_id: "externalId"
        version: "versionDetails.version"
        engine: "typeFields.kind"
      field_mappings:
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    eol:
      provider: endoflife-date
      product: amazon-aurora-mysql
      schema: standard

  - id: eks
    type: eks
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "cluster"
      required_mappings:
        # For EKS, Wiz's "externalId" column is an internal hash. Use
        # "providerUniqueId" so the resource ID is the cluster ARN.
        resource_id: "providerUniqueId"
        version: "versionDetails.version"
        # engine is implicit ("eks") — EKS reports have no engine column.
      field_mappings:
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    eol:
      provider: endoflife-date
      product: amazon-eks
      schema: eks_adapter

  - id: elasticache-redis
    type: elasticache
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "elastiCache/*/cluster"
      required_mappings:
        resource_id: "externalId"
        version: "versionDetails.version"
        engine: "typeFields.kind"
      field_mappings:
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    eol:
      provider: endoflife-date
      product: redis
      schema: standard

  - id: opensearch
    type: opensearch
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "elasticSearchService|OpenSearch Domain"
      required_mappings:
        resource_id: "externalId"
        version: "versionDetails.version"
        # engine is derived from the version (Elasticsearch <= 7.x vs OpenSearch).
      field_mappings:
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    eol:
      provider: endoflife-date
      product: amazon-opensearch
      schema: standard

  - id: rds-mysql
    type: rds
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "rds/MySQL/instance"
      required_mappings:
        resource_id: "externalId"
        version: "versionDetails.version"
        engine: "typeFields.kind"
      field_mappings:
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    eol:
      provider: endoflife-date
      product: amazon-rds-mysql
      schema: standard

  - id: rds-postgresql
    type: rds
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "rds/PostgreSQL/instance"
      required_mappings:
        resource_id: "externalId"
        version: "versionDetails.version"
        engine: "typeFields.kind"
      field_mappings:
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    eol:
      provider: endoflife-date
      product: amazon-rds-postgresql
      schema: standard

  - id: lambda
    type: lambda
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "lambda"
      required_mappings:
        resource_id: "externalId"
        # version (runtime) and engine are extracted from
        # graphEntity.properties JSON, not from individual columns.
      field_mappings:
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    eol:
      provider: endoflife-date
      product: aws-lambda
      schema: standard

  # Add more resources using the add-version-guard-resource skill
  #
  # Configuration:
  # 1. Add resource definitions below
  # 2. Set WIZ_REPORT_IDS environment variable with JSON map of resource ID to report ID
  #    Example: WIZ_REPORT_IDS='{"aurora-postgresql":"report-123","eks":"report-456"}'
  #
  # Example: Aurora PostgreSQL (Standard Schema)
  # - id: aurora-postgresql
  #   type: aurora
  #   cloud_provider: aws
  #   inventory:
  #     source: wiz
  #     native_type_pattern: "rds/AmazonAuroraPostgreSQL/cluster"
  #     required_mappings:
  #       resource_id: "externalId"
  #       version: "versionDetails.version"
  #       engine: "typeFields.kind"
  #     field_mappings:
  #       name: "name"
  #       account_id: "cloudAccount.externalId"
  #       region: "region"
  #       tags: "tags"
  #   eol:
  #     provider: endoflife-date
  #     product: amazon-aurora-postgresql
  #     schema: standard
  #
  # Example: EKS (Non-Standard Schema)
  # NOTE: For EKS, Wiz's "externalId" is an internal hash, not the cluster
  # ARN. Map resource_id to "providerUniqueId" to capture the ARN. EKS is
  # exempt from the engine required_mapping (engine is implicit).
  # - id: eks
  #   type: eks
  #   cloud_provider: aws
  #   inventory:
  #     source: wiz
  #     native_type_pattern: "eks/Cluster"
  #     required_mappings:
  #       resource_id: "providerUniqueId"
  #       version: "versionDetails.version"
  #     field_mappings:
  #       name: "name"
  #       account_id: "cloudAccount.externalId"
  #       region: "region"
  #       tags: "tags"
  #   eol:
  #     provider: endoflife-date
  #     product: amazon-eks
  #     schema: eks_adapter
  #
  # Example: ElastiCache Redis (Standard Schema)
  # - id: elasticache-redis
  #   type: elasticache
  #   cloud_provider: aws
  #   inventory:
  #     source: wiz
  #     native_type_pattern: "elastiCache/Redis/cluster"
  #     required_mappings:
  #       resource_id: "externalId"
  #       version: "versionDetails.version"
  #       engine: "typeFields.kind"
  #     field_mappings:
  #       name: "name"
  #       account_id: "cloudAccount.externalId"
  #       region: "region"
  #       tags: "tags"
