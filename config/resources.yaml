version: v1
# field_mappings drives ALL CSV column lookups in the inventory parser.
# Required keys: resource_id, version, engine
#   - lambda is exempt from version + engine (runtime extracted from
#     graphEntity.properties; engine is implicitly "aws-lambda").
#   - eks and opensearch are exempt from engine (eks uses literal "eks";
#     opensearch derives engine from the version).
# Optional keys default to the canonical Wiz columns:
#   name -> "name", account_id -> "cloudAccount.externalId",
#   region -> "region", tags -> "tags".
resources:
  - id: aurora-postgresql
    type: aurora
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "rds/AmazonAuroraPostgreSQL/cluster"
      field_mappings:
        resource_id: "externalId"
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        version: "versionDetails.version"
        engine: "typeFields.kind"
        tags: "tags"
    eol:
      provider: endoflife-date
      product: amazon-aurora-postgresql
      schema: standard

  - id: aurora-mysql
    type: aurora
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "rds/AmazonAuroraMySQL/cluster"
      field_mappings:
        resource_id: "externalId"
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        version: "versionDetails.version"
        engine: "typeFields.kind"
        tags: "tags"
    eol:
      provider: endoflife-date
      product: amazon-aurora-mysql
      schema: standard

  - id: eks
    type: eks
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "cluster"
      field_mappings:
        # For EKS, Wiz's "externalId" column is an internal hash. Use
        # "providerUniqueId" so the resource ID is the cluster ARN.
        resource_id: "providerUniqueId"
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        version: "versionDetails.version"
        # engine is implicit ("eks") — EKS reports have no engine column.
        tags: "tags"
    eol:
      provider: endoflife-date
      product: amazon-eks
      schema: eks_adapter

  - id: elasticache-redis
    type: elasticache
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "elastiCache/*/cluster"
      field_mappings:
        resource_id: "externalId"
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        version: "versionDetails.version"
        engine: "typeFields.kind"
        tags: "tags"
    eol:
      provider: endoflife-date
      product: redis
      schema: standard

  - id: opensearch
    type: opensearch
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "elasticSearchService|OpenSearch Domain"
      field_mappings:
        resource_id: "externalId"
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        version: "versionDetails.version"
        # engine is derived from the version (Elasticsearch <= 7.x vs OpenSearch).
        tags: "tags"
    eol:
      provider: endoflife-date
      product: amazon-opensearch
      schema: standard

  - id: rds-mysql
    type: rds
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "rds/MySQL/instance"
      field_mappings:
        resource_id: "externalId"
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        version: "versionDetails.version"
        engine: "typeFields.kind"
        tags: "tags"
    eol:
      provider: endoflife-date
      product: amazon-rds-mysql
      schema: standard

  - id: rds-postgresql
    type: rds
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "rds/PostgreSQL/instance"
      field_mappings:
        resource_id: "externalId"
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        version: "versionDetails.version"
        engine: "typeFields.kind"
        tags: "tags"
    eol:
      provider: endoflife-date
      product: amazon-rds-postgresql
      schema: standard

  - id: lambda
    type: lambda
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "lambda"
      field_mappings:
        resource_id: "externalId"
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        # version (runtime) and engine are extracted from
        # graphEntity.properties JSON, not from individual columns.
        tags: "tags"
    eol:
      provider: endoflife-date
      product: aws-lambda
      schema: standard

  # To add a new resource type, follow skills/add-version-guard-resource.
  # Standalone copy-paste templates live in skills/add-version-guard-resource/examples/.
