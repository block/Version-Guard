version: v1
# Each resource defines two YAML maps for clarity:
#
#   required_mappings  — every entry MUST be present and non-empty.
#                        Validated at config load time so YAML typos
#                        fail fast at startup instead of mid-scan.
#   field_mappings     — optional. Missing values produce empty
#                        strings on the typed Resource (for typed
#                        keys: tags) or absent entries in
#                        Resource.Extra (for non-typed keys: name,
#                        account_id, region, owner, ...).
#
# Typed keys (always end up on the typed Resource): resource_id,
# version, engine, tags. Everything else flows into Resource.Extra
# under its YAML logical name.
#
# A given key MUST appear in at most one of the two maps; the loader
# rejects duplicates.
#
# Transforms (optional, declarative reshaping of version/engine):
# resources whose inventory data needs reshaping declare it via a
# `transforms` block. The DSL is intentionally narrow — one named
# operation per case, no general expressions. Available ops:
#
#   transforms.version.strip_prefixes:    [str, ...]   (OpenSearch)
#   transforms.version.extract_json_field: {from_column, field, skip_if_empty}  (Lambda)
#   transforms.engine.constant:            str         (Lambda)
#   transforms.engine.default_if_empty:    str         (EKS)
#   transforms.engine.substring_lookup:    [{contains, result}, ...]  (Aurora)
#   transforms.engine.from_version_major:  {majors, default}  (OpenSearch)
#
# Resources without a transforms block use raw column values; engine
# is lowercased+trimmed by default.
resources:
  - id: aurora-postgresql
    type: aurora
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "rds/AmazonAuroraPostgreSQL/cluster"
      required_mappings:
        resource_id: "externalId"
        version: "versionDetails.version"
        engine: "typeFields.kind"
      field_mappings:
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    transforms:
      engine:
        # native_type_pattern guarantees every row here has
        # typeFields.kind="AuroraPostgreSQL". Lowercased it becomes
        # "aurorapostgresql"; map that to the engine name
        # endoflife.date keys cycles by.
        substring_lookup:
          - contains: ["aurora", "postgres"]
            result: "aurora-postgresql"
    eol:
      provider: endoflife-date
      product: amazon-aurora-postgresql
      schema: standard

  - id: aurora-mysql
    type: aurora
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "rds/AmazonAuroraMySQL/cluster"
      required_mappings:
        resource_id: "externalId"
        version: "versionDetails.version"
        engine: "typeFields.kind"
      field_mappings:
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    transforms:
      engine:
        substring_lookup:
          - contains: ["aurora", "mysql"]
            result: "aurora-mysql"
    eol:
      provider: endoflife-date
      product: amazon-aurora-mysql
      schema: standard

  - id: eks
    type: eks
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "cluster"
      required_mappings:
        # For EKS, Wiz's "externalId" column is an internal hash. Use
        # "providerUniqueId" so the resource ID is the cluster ARN.
        resource_id: "providerUniqueId"
        version: "versionDetails.version"
      field_mappings:
        # engine is implicit ("eks") — EKS reports have no engine column.
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    transforms:
      engine:
        # EKS reports have no engine column; default the empty string
        # to the engine name endoflife.date uses.
        default_if_empty: "eks"
    eol:
      provider: endoflife-date
      product: amazon-eks
      schema: eks_adapter

  # ElastiCache is split per-engine because each engine has its own
  # endoflife.date product with different lifecycle semantics, and Wiz
  # reports them as distinct nativeTypes (elastiCache/<Engine>/cluster).
  # All three configs read from the SAME Wiz report; the
  # native_type_pattern filter narrows each one to its engine's rows.
  # Set WIZ_REPORT_IDS to map all three keys to the same report ID:
  #   {"elasticache-redis":"X","elasticache-valkey":"X","elasticache-memcached":"X"}
  - id: elasticache-redis
    type: elasticache
    cloud_provider: aws
    inventory:
      source: wiz
      # Engine-specific pattern — keeps Valkey/Memcached rows out of
      # the redis lookup, which would otherwise route to the wrong
      # endoflife.date product and emit UNKNOWN findings.
      native_type_pattern: "elastiCache/Redis/cluster"
      required_mappings:
        resource_id: "externalId"
        version: "versionDetails.version"
        engine: "typeFields.kind"
      field_mappings:
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    eol:
      provider: endoflife-date
      # AWS-flavored product, NOT upstream `redis`. AWS ElastiCache
      # ships AWS-specific cycles (e.g. 7.1) that don't exist on
      # upstream Redis, and AWS lifecycle dates differ from upstream.
      # Cycles are major-only ("7", "6", "5", "4") so prefix-matching
      # in the provider resolves "7.1.0" → cycle "7" cleanly.
      product: amazon-elasticache-redis
      schema: standard

  - id: elasticache-valkey
    type: elasticache
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "elastiCache/Valkey/cluster"
      required_mappings:
        resource_id: "externalId"
        version: "versionDetails.version"
        engine: "typeFields.kind"
      field_mappings:
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    eol:
      provider: endoflife-date
      # Upstream valkey product — endoflife.date does not yet have an
      # AWS-flavored amazon-elasticache-valkey product. Cycles are
      # minor-granularity (8.1, 8.0, 7.2) which prefix-matches
      # AWS-reported full versions.
      product: valkey
      schema: standard

  - id: elasticache-memcached
    type: elasticache
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "elastiCache/Memcached/cluster"
      required_mappings:
        resource_id: "externalId"
        version: "versionDetails.version"
        engine: "typeFields.kind"
      field_mappings:
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    eol:
      provider: endoflife-date
      # Upstream memcached product — endoflife.date does not have an
      # AWS-flavored amazon-elasticache-memcached product.
      product: memcached
      schema: standard

  - id: opensearch
    type: opensearch
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "elasticSearchService|OpenSearch Domain"
      required_mappings:
        resource_id: "externalId"
        version: "versionDetails.version"
      field_mappings:
        # engine is derived from the version transform below.
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    transforms:
      version:
        # Wiz reports "OpenSearch_2.13" / "Elasticsearch_7.10"; strip the
        # engine prefix so endoflife.date receives the bare version.
        strip_prefixes: ["OpenSearch_", "Elasticsearch_"]
      engine:
        # OpenSearch forked from Elasticsearch at 7.10. Major versions
        # 5/6/7 are still managed as Elasticsearch on endoflife.date;
        # 1/2/3+ are OpenSearch.
        from_version_major:
          majors:
            "5": "elasticsearch"
            "6": "elasticsearch"
            "7": "elasticsearch"
          default: "opensearch"
    eol:
      provider: endoflife-date
      product: amazon-opensearch
      schema: standard

  - id: rds-mysql
    type: rds
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "rds/MySQL/instance"
      required_mappings:
        resource_id: "externalId"
        version: "versionDetails.version"
        engine: "typeFields.kind"
      field_mappings:
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    eol:
      provider: endoflife-date
      product: amazon-rds-mysql
      schema: standard

  - id: rds-postgresql
    type: rds
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "rds/PostgreSQL/instance"
      required_mappings:
        resource_id: "externalId"
        version: "versionDetails.version"
        engine: "typeFields.kind"
      field_mappings:
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    eol:
      provider: endoflife-date
      product: amazon-rds-postgresql
      schema: standard

  - id: lambda
    type: lambda
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "lambda"
      required_mappings:
        # version (runtime) and engine are extracted via the transforms
        # block, not from individual mapped columns.
        resource_id: "externalId"
      field_mappings:
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    transforms:
      version:
        # Lambda runtime ("python3.12", "nodejs20.x", ...) is the cycle
        # identifier on endoflife.date's aws-lambda product.
        # skip_if_empty drops container-image Lambdas (runtime=null) —
        # AWS doesn't EOL container images so they're out of scope.
        extract_json_field:
          from_column: "graphEntity.properties"
          field: "runtime"
          skip_if_empty: true
      engine:
        constant: "aws-lambda"
    eol:
      provider: endoflife-date
      product: aws-lambda
      schema: standard

  # To add a new resource type, follow skills/add-version-guard-resource.
  # Standalone copy-paste templates live in skills/add-version-guard-resource/examples/.
