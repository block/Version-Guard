# Example: EKS (Non-Standard Schema)
# This is an example of a resource using NON-STANDARD endoflife.date schema
# EKS uses cycle.eol to mean "end of extended support" NOT "true EOL"
# Requires custom adapter: eks_adapter
#
# IMPORTANT: The resource 'id' is used to look up the Wiz report ID
# in the WIZ_REPORT_IDS JSON map environment variable.
#
# Example: WIZ_REPORT_IDS='{"eks":"report-id-here"}'

  - id: eks
    type: eks
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "cluster"
      # required_mappings: every entry MUST be present and non-empty.
      # EKS doesn't include an engine column — engine is implicitly "eks".
      required_mappings:
        # For EKS, Wiz's "externalId" column is an internal hash. Map
        # resource_id to "providerUniqueId" so Resource.ID is the cluster ARN.
        resource_id: "providerUniqueId"
        version: "versionDetails.version"
      field_mappings:
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    eol:
      provider: endoflife-date
      product: amazon-eks
      schema: eks_adapter  # Non-standard! cycle.eol → ExtendedSupportEnd (NOT EOLDate)
