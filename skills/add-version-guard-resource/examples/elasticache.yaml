# Example: ElastiCache (Standard Schema, per-engine split)
#
# ElastiCache is split into three configs — one per engine — because
# Wiz reports each engine as its own nativeType
# (elastiCache/<Engine>/cluster) and each engine has its own
# endoflife.date product with different lifecycle semantics. Folding
# them into a single config (e.g. with a wildcard pattern + the
# upstream `redis` product) routes Valkey/Memcached rows to the wrong
# product and silently emits UNKNOWN findings.
#
# IMPORTANT: All three configs share the SAME Wiz report — the
# native_type_pattern filter narrows each one to its engine's rows.
# Set WIZ_REPORT_IDS to map all three keys to the same report ID:
#
#   WIZ_REPORT_IDS='{
#     "elasticache-redis":"<report-id>",
#     "elasticache-valkey":"<report-id>",
#     "elasticache-memcached":"<report-id>"
#   }'

  - id: elasticache-redis
    type: elasticache
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "elastiCache/Redis/cluster"
      required_mappings:
        resource_id: "externalId"
        version: "versionDetails.version"
        engine: "typeFields.kind"
      field_mappings:
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    eol:
      provider: endoflife-date
      # AWS-flavored product, NOT upstream `redis`. AWS ships
      # AWS-specific cycles (e.g. 7.1) that don't exist on upstream
      # Redis, and AWS lifecycle dates differ. Cycles are major-only
      # so prefix-matching resolves "7.1.0" → cycle "7" cleanly.
      product: amazon-elasticache-redis
      schema: standard

  - id: elasticache-valkey
    type: elasticache
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "elastiCache/Valkey/cluster"
      required_mappings:
        resource_id: "externalId"
        version: "versionDetails.version"
        engine: "typeFields.kind"
      field_mappings:
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    eol:
      provider: endoflife-date
      # Upstream valkey — endoflife.date does not yet have an
      # amazon-elasticache-valkey product.
      product: valkey
      schema: standard

  - id: elasticache-memcached
    type: elasticache
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "elastiCache/Memcached/cluster"
      required_mappings:
        resource_id: "externalId"
        version: "versionDetails.version"
        engine: "typeFields.kind"
      field_mappings:
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    eol:
      provider: endoflife-date
      # Upstream memcached — endoflife.date does not have an
      # amazon-elasticache-memcached product.
      product: memcached
      schema: standard
