# Example: Aurora PostgreSQL (Standard Schema)
# This is the config for Test 1 - used for testing the skill
#
# IMPORTANT: The resource 'id' is used to look up the Wiz report ID
# in the WIZ_REPORT_IDS JSON map environment variable.
#
# Example: WIZ_REPORT_IDS='{"aurora-postgresql":"report-id-here"}'

  - id: aurora-postgresql
    type: aurora
    cloud_provider: aws
    inventory:
      source: wiz
      native_type_pattern: "rds/AmazonAuroraPostgreSQL/cluster"
      # required_mappings: every entry MUST be present and non-empty.
      # Loader fails fast at startup if any are missing.
      required_mappings:
        resource_id: "externalId"
        version: "versionDetails.version"
        engine: "typeFields.kind"
      # field_mappings: optional. Typed keys (tags) populate the typed
      # Resource; everything else lands in Resource.Extra under its
      # YAML key.
      field_mappings:
        name: "name"
        account_id: "cloudAccount.externalId"
        region: "region"
        tags: "tags"
    transforms:
      # Wiz's typeFields.kind reports "AuroraPostgreSQL"; map to
      # the engine name endoflife.date keys cycles by. See
      # TRANSFORMS.md for the full operation reference.
      engine:
        substring_lookup:
          - contains: ["aurora", "postgres"]
            result: "aurora-postgresql"
    eol:
      provider: endoflife-date
      product: amazon-aurora-postgresql
      schema: standard  # Standard schema
